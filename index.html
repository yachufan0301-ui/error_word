        const nextBtn = document.getElementById('next-btn');

        function loadQuestion() {
            container.innerHTML = "";
            foundCount = 0;
            const currentQ = exercises[currentIndex];
            const totalErrors = currentQ.filter(item => item.isError).length;
            progressDiv.textContent = `第 ${currentIndex + 1} 題 / 共 ${exercises.length} 題`;
            statusDiv.style.color = "#444";
            statusDiv.textContent = `錯字：${foundCount} / ${totalErrors}`;
            nextBtn.style.display = "none";

            currentQ.forEach((item) => {
                const div = document.createElement('div');
                div.className = 'word-box';
                div.innerHTML = `<div class="zhuyin">${item.z}</div><div class="char">${item.char}</div>`;
                div.onclick = () => {
                    if (div.classList.contains('found')) return;
                    if (item.isError) {
                        div.querySelector('.char').textContent = item.correct;
                        div.classList.add('found');
                        foundCount++;
                        statusDiv.textContent = `錯字：${foundCount} / ${totalErrors}`;
                        if (foundCount === totalErrors) {
                            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                            statusDiv.textContent = "太棒了！全部找出來了！";
                            statusDiv.style.color = "green";
                            if (currentIndex < exercises.length - 1) nextBtn.style.display = "block";
                        }
                    } else {
                        div.querySelector('.char').style.borderColor = 'red';
                        setTimeout(() => div.querySelector('.char').style.borderColor = '#ccc', 500);
                    }
                };
                container.appendChild(div);
            });
        }

            if (currentIndex < exercises.length - 1) {
                currentIndex++;
                loadQuestion();
            }
